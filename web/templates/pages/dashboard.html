{{define "content"}}
<h1>Dashboard</h1>

<div class="dashboard-grid">
  {{/* Traffic Overview — polls every 30s */}}
  <section class="panel panel-wide" id="traffic-overview"
    hx-get="/partials/traffic" hx-trigger="every 30s" hx-swap="innerHTML">
    {{template "_traffic_overview" .}}
  </section>

  {{/* GeoIP — Traffic by Country */}}
  <section class="panel panel-wide" id="geo-map">
    {{template "_geo_map" .}}
  </section>
</div>
{{end}}
