{{define "_bandwidth_chart"}}
<h2>Bandwidth per Hour <small>({{.Extra.RangeLabel}})</small></h2>
{{if .Extra.BWBars}}
<div class="chart-wrap">
  <svg viewBox="0 0 {{multiply (len .Extra.BWBars) 30}} 200" class="bar-chart bw-chart" preserveAspectRatio="none">
    {{range $i, $bar := .Extra.BWBars}}
    <rect x="{{multiply $i 30}}" y="{{sub 200 $bar.Height}}" width="28" height="{{$bar.Height}}" class="bar bar-bw">
      <title>{{$bar.Hour}}: {{humanSize $bar.Bytes}}</title>
    </rect>
    {{end}}
  </svg>
  <div class="chart-labels">
    {{range .Extra.BWBars}}
    <span class="chart-label">{{shortHour .Hour}}</span>
    {{end}}
  </div>
</div>
{{else}}
<p class="muted">No bandwidth data for the selected range.</p>
{{end}}
{{end}}
