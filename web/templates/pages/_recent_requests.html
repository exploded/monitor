{{define "_recent_requests"}}
{{range .Extra.Recent}}
<tr class="{{statusClass .Status}}{{if eq .IsBot 1}} bot-row{{end}}">
  <td>{{formatTime .Ts}}</td>
  <td>{{.Host}}</td>
  <td>{{.ClientIp}}</td>
  <td>{{.Method}}</td>
  <td class="uri-cell" title="{{.Uri}}">{{truncate .Uri 40}}</td>
  <td>{{.Status}}</td>
  <td class="ua-cell" title="{{.UserAgent}}">{{truncate .UserAgent 30}}</td>
  <td>
    <button class="btn-sm btn-block" hx-post="/ips" hx-vals='{"ip":"{{.ClientIp}}","reason":"blocked from live log"}' hx-target="#ip-list" hx-swap="innerHTML" hx-disabled-elt="this" hx-on::after-request="if(event.detail.successful){this.textContent='Blocked';this.disabled=true;this.classList.replace('btn-block','btn-blocked')}">Block</button>
  </td>
</tr>
{{end}}
{{end}}
