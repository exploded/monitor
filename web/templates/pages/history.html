{{define "content"}}
<h1>History</h1>

{{/* Hourly Chart */}}
<section class="panel panel-wide" id="hourly-chart">
  {{template "_hourly_chart" .}}
</section>

{{/* Latency Percentiles */}}
<section class="panel panel-wide" id="latency-chart">
  {{template "_latency_chart" .}}
</section>

{{/* Bandwidth */}}
<section class="panel panel-wide" id="bandwidth-chart">
  {{template "_bandwidth_chart" .}}
</section>

{{/* Daily Summary */}}
<section class="panel panel-wide" id="daily-summary">
  {{template "_daily_summary" .}}
</section>

{{/* Search */}}
<section class="panel panel-wide">
  <h2>Search</h2>
  <form id="search-form" hx-get="/search" hx-target="#search-results" hx-swap="innerHTML" class="search-form">
    <input type="text" name="host" placeholder="Host">
    <input type="text" name="ip" placeholder="IP">
    <input type="text" name="ua" placeholder="User Agent">
    <select name="status">
      <option value="">Any Status</option>
      <option value="2">2xx OK</option>
      <option value="3">3xx Redirect</option>
      <option value="4">4xx Client Error</option>
      <option value="5">5xx Server Error</option>
    </select>
    <input type="date" name="from">
    <input type="date" name="to">
    <button type="submit" class="btn btn-primary">Search</button>
    <button type="button" class="btn btn-secondary" onclick="exportResults('csv')">Export CSV</button>
    <button type="button" class="btn btn-secondary" onclick="exportResults('json')">Export JSON</button>
  </form>
  <div id="search-results"></div>
</section>

<script>
function exportResults(format) {
  var f = document.getElementById('search-form');
  var params = new URLSearchParams(new FormData(f));
  params.set('format', format);
  window.location.href = '/export/search?' + params.toString();
}
</script>
{{end}}
