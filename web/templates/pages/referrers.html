{{define "content"}}
<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;flex-wrap:wrap">
  <h1 style="margin:0">Referrers</h1>
  <select id="ref-host" style="padding:0.35rem 0.5rem;background:var(--panel);color:var(--fg);border:1px solid var(--border);border-radius:4px">
    <option value="">All hosts</option>
    {{range .Extra.Hosts}}
    <option value="{{.}}"{{if eq . $.Extra.SelectedHost}} selected{{end}}>{{.}}</option>
    {{end}}
  </select>
  <select id="ref-range" style="padding:0.35rem 0.5rem;background:var(--panel);color:var(--fg);border:1px solid var(--border);border-radius:4px">
    <option value="6h"{{if eq .Extra.Range "6h"}} selected{{end}}>Last 6 hours</option>
    <option value="12h"{{if eq .Extra.Range "12h"}} selected{{end}}>Last 12 hours</option>
    <option value="24h"{{if eq .Extra.Range "24h"}} selected{{end}}>Last 24 hours</option>
    <option value="48h"{{if eq .Extra.Range "48h"}} selected{{end}}>Last 48 hours</option>
    <option value="7d"{{if eq .Extra.Range "7d"}} selected{{end}}>Last 7 days</option>
  </select>
</div>

<script>
function updateReferrers() {
  var host = document.getElementById('ref-host').value;
  var range = document.getElementById('ref-range').value;
  var url = '/partials/referrers?range=' + range;
  if (host) url += '&host=' + encodeURIComponent(host);
  htmx.ajax('GET', url, {target:'#referrers-data', swap:'innerHTML'});
}
document.getElementById('ref-host').addEventListener('change', updateReferrers);
document.getElementById('ref-range').addEventListener('change', updateReferrers);
</script>

<div id="referrers-data">
  {{template "_referrers_data" .}}
</div>
{{end}}
