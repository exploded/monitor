{{define "_hourly_chart"}}
<h2>Requests per Hour <small>({{.Extra.RangeLabel}})</small></h2>
{{if .Extra.Bars}}
<div class="chart-wrap">
  <svg viewBox="0 0 {{multiply (len .Extra.Bars) 30}} 200" class="bar-chart" preserveAspectRatio="none">
    {{range $i, $bar := .Extra.Bars}}
    <rect x="{{multiply $i 30}}" y="{{sub 200 $bar.Height}}" width="28" height="{{$bar.Height}}" class="bar">
      <title>{{$bar.Hour}}: {{$bar.Count}} requests</title>
    </rect>
    {{end}}
  </svg>
  <div class="chart-labels">
    {{$step := .Extra.LabelStep}}
    {{range $i, $bar := .Extra.Bars}}
    <span class="chart-label">{{if eq (mod $i $step) 0}}{{chartLabel $bar.Hour $step}}{{end}}</span>
    {{end}}
  </div>
</div>
{{else}}
<p class="muted">No data for the selected range.</p>
{{end}}
{{end}}
