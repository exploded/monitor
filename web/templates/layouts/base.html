{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — Monitor</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="manifest" href="/static/site.webmanifest">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/js/htmx.min.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Monitor</div>
    <div class="nav-links">
      <a href="/" class="nav-link{{if eq .Title "Dashboard"}} active{{end}}">Dashboard</a>
      <a href="/requests" class="nav-link{{if eq .Title "Requests"}} active{{end}}">Requests</a>
      <a href="/security" class="nav-link{{if eq .Title "Security"}} active{{end}}">Security</a>
      <a href="/alerts/dashboard" class="nav-link{{if eq .Title "Alerts"}} active{{end}}">Alerts</a>
      <a href="/app-logs" class="nav-link{{if eq .Title "App Logs"}} active{{end}}">App Logs</a>
      <a href="/history" class="nav-link{{if eq .Title "History"}} active{{end}}">History</a>
      <a href="/uptime" class="nav-link{{if eq .Title "Uptime"}} active{{end}}">Uptime</a>
    </div>
  </nav>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>
{{end}}
